<style>
        body {
            background-color: #F7F4EF;
            color: #1e1b18;
        }
        .organic-shadow {
            box-shadow: 0 4px 20px -2px rgba(30, 27, 24, 0.05);
        }
        .btn-hover-effect:active {
            transform: scale(0.98);
            transition: transform 0.1s ease-out;
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-body-md text-body-md antialiased selection:bg-primary-fixed-dim">
<!-- Content Area: Center Aligned Login Card -->
<main class="flex-grow flex items-center justify-center px-container-margin py-xxl">
<div class="w-full max-w-md">
<!-- Brand Logo / Anchor -->
<div class="text-center mb-xl">
<span class="font-headline-md text-headline-md font-bold text-primary tracking-tight">CIRIL</span>
</div>
<!-- Login Card -->
<section class="bg-white border border-outline-variant rounded-xl p-xl md:p-xxl organic-shadow">
<header class="mb-xl text-center">
<h1 class="font-headline-lg text-headline-lg italic text-on-surface">Welcome back</h1>
<p class="text-on-surface-variant mt-sm">Connect with your world on CIRIL.</p>
</header>
<form action="#" id="auth-form" method="POST">
<!-- Step 1: Phone Input -->
<div class="space-y-lg" id="phone-input-step">
<div class="space-y-xs">
<label class="font-body-md text-on-surface font-medium block" for="phone">Phone number</label>
<div class="relative">
<input class="w-full bg-white border border-outline-variant rounded-lg px-md py-md text-body-md focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all placeholder:text-on-tertiary-fixed-variant" id="phone" name="phone" placeholder="+1 (555) 000-0000" required="" type="tel"/>
</div>
</div>
<button class="w-full py-md px-lg bg-primary text-white rounded-xl font-button text-button btn-hover-effect hover:bg-primary-container transition-all shadow-sm" onclick="showOtpStep()" type="button">
                            Send OTP
                        </button>
<!-- Social Sign In - Moved inside step 1 as secondary option -->
<div class="relative my-xl">
<div aria-hidden="true" class="absolute inset-0 flex items-center">
<div class="w-full border-t border-outline-variant"></div>
</div>
<div class="relative flex justify-center text-sm">
<span class="px-md bg-white text-on-tertiary-fixed-variant font-label-mono text-label-mono uppercase">OR</span>
</div>
</div>
<button class="w-full flex items-center justify-center gap-md py-md px-lg border border-outline-variant rounded-xl bg-white text-on-surface font-button btn-hover-effect hover:bg-surface-container-low transition-colors duration-200" type="button">
<svg height="20" viewbox="0 0 24 24" width="20" xmlns="http://www.w3.org/2000/svg">
<path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"></path>
<path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-1 .67-2.28 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"></path>
<path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"></path>
<path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 12-4.53z" fill="#EA4335"></path>
</svg>
<span>Continue with Google</span>
</button>
</div>
<!-- Step 2: OTP Verification -->
<div class="hidden space-y-lg" id="otp-verification-step">
<div class="text-center space-y-xs">
<p class="text-on-surface-variant">Enter the 6-digit code sent to</p>
<p class="font-semibold text-on-surface" id="display-phone">+1 (555) •••-••••</p>
</div>
<div class="flex justify-between gap-xs">
<input aria-label="Digit 1" class="otp-input w-full aspect-square text-center text-headline-md font-bold border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" inputmode="numeric" maxlength="1" type="text"/>
<input aria-label="Digit 2" class="otp-input w-full aspect-square text-center text-headline-md font-bold border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" inputmode="numeric" maxlength="1" type="text"/>
<input aria-label="Digit 3" class="otp-input w-full aspect-square text-center text-headline-md font-bold border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" inputmode="numeric" maxlength="1" type="text"/>
<input aria-label="Digit 4" class="otp-input w-full aspect-square text-center text-headline-md font-bold border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" inputmode="numeric" maxlength="1" type="text"/>
<input aria-label="Digit 5" class="otp-input w-full aspect-square text-center text-headline-md font-bold border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" inputmode="numeric" maxlength="1" type="text"/>
<input aria-label="Digit 6" class="otp-input w-full aspect-square text-center text-headline-md font-bold border border-outline-variant rounded-lg focus:ring-2 focus:ring-primary focus:border-primary outline-none transition-all" inputmode="numeric" maxlength="1" type="text"/>
</div>
<button class="w-full py-md px-lg bg-primary text-white rounded-xl font-button text-button btn-hover-effect hover:bg-primary-container transition-all shadow-sm" type="submit">
                            Verify &amp; Sign In
                        </button>
<div class="text-center">
<button class="text-sm text-primary hover:underline font-medium mb-sm block w-full" onclick="showPhoneStep()" type="button">Change phone number</button>
<p class="text-sm text-on-surface-variant">
                                Resend code in <span class="font-label-mono text-primary">0:30</span>
</p>
</div>
</div>
</form>
<footer class="mt-xl pt-lg border-t border-outline-variant text-center">
<p class="text-on-surface-variant font-body-md">
                        New to CIRIL? 
                        <a class="text-primary font-semibold hover:underline decoration-primary-fixed-dim underline-offset-4 transition-all" href="#">Create an account</a>
</p>
</footer>
</section>
<!-- Secondary Links -->
<div class="mt-lg flex justify-center gap-xl text-label-mono font-label-mono text-on-tertiary-fixed-variant uppercase tracking-wider">
<a class="hover:text-primary transition-colors" href="#">Privacy</a>
<a class="hover:text-primary transition-colors" href="#">Safety</a>
<a class="hover:text-primary transition-colors" href="#">Terms</a>
</div>
</div>
</main>
<!-- Footer Mirroring Shared Components Logic -->
<footer class="w-full py-xl border-t border-outline-variant bg-surface-container-low mt-auto">
<div class="max-w-7xl mx-auto px-lg flex flex-col md:flex-row justify-between items-center gap-md">
<p class="font-label-mono text-label-mono text-on-tertiary-fixed-variant opacity-80">
                © 2024 CIRIL. Built for human connection.
            </p>
<div class="flex gap-lg">
<a class="font-label-mono text-label-mono text-on-tertiary-fixed-variant hover:text-primary transition-colors" href="#">Support</a>
<a class="font-label-mono text-label-mono text-on-tertiary-fixed-variant hover:text-primary transition-colors" href="#">Our Story</a>
</div>
</div>
</footer>
<!-- Logic for flow and micro-interactions -->
<script>
        function showOtpStep() {
            const phone = document.getElementById('phone').value;
            if (phone.length > 5) {
                document.getElementById('display-phone').innerText = phone;
                document.getElementById('phone-input-step').classList.add('hidden');
                document.getElementById('otp-verification-step').classList.remove('hidden');
                // Focus first OTP input
                document.querySelector('.otp-input').focus();
            }
        }

        function showPhoneStep() {
            document.getElementById('otp-verification-step').classList.add('hidden');
            document.getElementById('phone-input-step').classList.remove('hidden');
        }

        // OTP auto-focus next input
        const otpInputs = document.querySelectorAll('.otp-input');
        otpInputs.forEach((input, index) => {
            input.addEventListener('input', (e) => {
                if (e.target.value && index < otpInputs.length - 1) {
                    otpInputs[index + 1].focus();
                }
            });
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Backspace' && !e.target.value && index > 0) {
                    otpInputs[index - 1].focus();
                }
            });
        });

        const inputs = document.querySelectorAll('input');
        inputs.forEach(input => {
            input.addEventListener('focus', () => {
                input.parentElement.closest('section').style.boxShadow = '0 8px 30px -4px rgba(170, 54, 0, 0.08)';
            });
            input.addEventListener('blur', () => {
                input.parentElement.closest('section').style.boxShadow = '0 4px 20px -2px rgba(30, 27, 24, 0.05)';
            });
        });
    </script>
</body></html>
